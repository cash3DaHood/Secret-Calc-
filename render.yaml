# Render Blueprint — deploy in a few clicks.
# In Render:  New +  →  Blueprint  →  connect your repo  →  Apply.
# Requires this file + package.json to be at the repository ROOT.
services:
  - type: web
    name: aw3-secret-calculator
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: JWT_SECRET
        generateValue: true        # Render generates a strong random secret
      # Optional free + persistent storage (recommended on the free plan, whose disk
      # is wiped on redeploys). Add these in the dashboard AFTER the first deploy:
      #   UPSTASH_REDIS_REST_URL   = <your Upstash REST URL>
      #   UPSTASH_REDIS_REST_TOKEN = <your Upstash REST token>
      # With them set, accounts/leaderboard/saves persist. Without them, it uses a
      # local data.json (fine for testing; resets on redeploy on the free plan).
